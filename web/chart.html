<!doctype html>
<!--
  ============================================================
  FILE: chart.html
  MÔ TẢ: Trang hiển thị đồ thị realtime và danh sách thông báo
  ============================================================
  
  HƯỚNG DẪN SỬ DỤNG:
  1. ĐỒ THỊ REALTIME:
     - Hiển thị công suất (W) và lưu lượng nước (mL/s) theo thời gian
     - Cập nhật mỗi giây từ Firebase Realtime Database
     - Giữ tối đa 120 điểm (~2 phút dữ liệu)
     - Trục Y trái: Công suất (W) - màu xanh dương
     - Trục Y phải: Lưu lượng nước (mL/s) - màu xanh lá
  
  2. THÔNG BÁO:
     - Hiển thị lịch sử chốt điện nước hàng tháng
     - Hiển thị cảnh báo vượt ngưỡng dòng điện
     - Có thể đánh dấu đã đọc hoặc xóa toàn bộ
  
  THƯ VIỆN SỬ DỤNG:
  - Chart.js: Vẽ đồ thị đường
  - Firebase SDK: Lấy dữ liệu realtime
  
  CÁC HÀM CHÍNH:
  - markAllRead(): Đánh dấu tất cả thông báo đã đọc
  - deleteAllNotifications(): Xóa toàn bộ thông báo
  - parseVietnameseTime(): Chuyển đổi định dạng thời gian Việt Nam
  - render(): Render lại danh sách thông báo
-->
<html lang="vi">
  <head>
    <!-- Meta charset UTF-8 để hỗ trợ tiếng Việt -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đồ thị công suất & lưu lượng nước</title>

    <!-- CSS cho trang đồ thị -->
    <link rel="stylesheet" href="chart.css" />

    <!-- 
      Chart.js - Thư viện vẽ đồ thị
      Tài liệu: https://www.chartjs.org/docs/
    -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <!-- 
      PHẦN ĐỒ THỊ REALTIME
      - Canvas để Chart.js vẽ đồ thị
      - ID: powerWaterChart
      - Hiển thị 2 dataset: Công suất và Lưu lượng nước
    -->
    <div class="chart-wrapper">
      <canvas id="powerWaterChart"></canvas>
    </div>

    <!-- 
      PHẦN THÔNG BÁO
      - Hiển thị danh sách thông báo từ Firebase
      - Có badge đếm số thông báo chưa đọc
      - Có nút đánh dấu đã đọc và xóa toàn bộ
    -->
    <div class="noti-container">
      <!-- Header với tiêu đề và các nút chức năng -->
      <div class="noti-header">
        <div class="left">
          <h2>Thông báo</h2>
          <!-- Badge hiển thị số thông báo chưa đọc -->
          <span id="unreadCount" class="badge">0</span>
        </div>
        <div class="header-buttons">
          <!-- Nút đánh dấu tất cả đã đọc -->
          <button onclick="markAllRead()">Đánh dấu đã đọc</button>
          <!-- Nút xóa toàn bộ thông báo -->
          <button class="delete-all-btn" onclick="deleteAllNotifications()">
            Xóa toàn bộ
          </button>
        </div>
      </div>

      <!-- Danh sách thông báo - được render bằng JavaScript -->
      <div class="noti-list" id="notiList">
        <!-- Các thông báo sẽ được thêm vào đây bằng JS -->
      </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
      /* ===== FIREBASE CONFIG ===== */
      firebase.initializeApp({
        apiKey: "AIzaSyD9Vmq5O9sVpOsTtQ3qNIyggsIaobNfBMw",
        databaseURL: "https://do-an-high-default-rtdb.firebaseio.com/",
      });

      /* ===== CHART INIT ===== */
      const ctx = document.getElementById("powerWaterChart").getContext("2d");

      /* nền canvas để khỏi bị mờ */
      const canvasBgPlugin = {
        id: "bg",
        beforeDraw: (chart) => {
          const { ctx, width, height } = chart;
          ctx.save();
          ctx.globalCompositeOperation = "destination-over";
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, width, height);
          ctx.restore();
        },
      };

      const chart = new Chart(ctx, {
        type: "line",
        plugins: [canvasBgPlugin],
        data: {
          labels: [],
          datasets: [
            {
              label: "Công suất (W)",
              data: [],
              borderColor: "#2563eb",
              backgroundColor: "rgba(37,99,235,0.12)",
              yAxisID: "yPower",
              tension: 0.35,
              pointRadius: 0,
            },
            {
              label: "Lưu lượng nước (mL/s)",
              data: [],
              borderColor: "#16a34a",
              backgroundColor: "rgba(22,163,74,0.12)",
              yAxisID: "yFlow",
              tension: 0.35,
              pointRadius: 0,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: {
            mode: "index",
            intersect: false,
          },
          layout: {
            padding: {
              top: 10,
              bottom: 10,
            },
          },
          scales: {
            x: {
              ticks: {
                color: "#374151",
                maxRotation: 45,
                minRotation: 0,
                font: { size: 11 },
              },
              grid: { color: "rgba(0,0,0,0.06)" },
            },
            yPower: {
              min: 0,
              max: 1000,
              ticks: {
                color: "#2563eb",
                font: { size: 12, weight: "500" },
                stepSize: 100,
              },
              grid: { color: "rgba(37,99,235,0.1)" },
              title: {
                display: true,
                text: "Công suất (W)",
                color: "#2563eb",
                font: { size: 14, weight: "600" },
              },
            },
            yFlow: {
              min: 0,
              max: 2000,
              position: "right",
              grid: { drawOnChartArea: false },
              ticks: {
                color: "#16a34a",
                font: { size: 12, weight: "500" },
                stepSize: 200,
              },
              title: {
                display: true,
                text: "Lưu lượng (mL/s)",
                color: "#16a34a",
                font: { size: 14, weight: "600" },
              },
            },
          },
          plugins: {
            legend: {
              labels: {
                color: "#111827",
                font: { weight: "600" },
              },
            },
          },
        },
      });

      /* ===== REALTIME UPDATE – MỖI 1 GIÂY ===== */
      firebase.auth().onAuthStateChanged((user) => {
        if (!user) return;

        const uid = user.uid;
        const dbRef = firebase.database().ref("users/" + uid);

        dbRef.on("value", (snap) => {
          const d = snap.val();
          if (!d) return;

          const now = new Date();
          const label =
            now.getHours() +
            ":" +
            String(now.getMinutes()).padStart(2, "0") +
            ":" +
            String(now.getSeconds()).padStart(2, "0");

          chart.data.labels.push(label);
          chart.data.datasets[0].data.push(d.power ?? 0);
          chart.data.datasets[1].data.push(d.flow_ml_s ?? 0);

          // giữ tối đa 120 điểm (~2 phút)
          if (chart.data.labels.length > 120) {
            chart.data.labels.shift();
            chart.data.datasets.forEach((ds) => ds.data.shift());
          }

          chart.update();
        });
      });
    </script>

    <script>
      firebase.auth().onAuthStateChanged((user) => {
        if (!user) return;

        const uid = user.uid;
        const notiList = document.getElementById("notiList");
        const badge = document.getElementById("unreadCount");

        let notifications = [];

        /* ===== LOAD MONTHLY LOG ===== */
        firebase
          .database()
          .ref(`users/${uid}/logs/monthly`)
          .on("value", (snap) => {
            notifications = notifications.filter((n) => n.type !== "monthly");

            snap.forEach((child) => {
              const d = child.val();
              notifications.push({
                id: child.key,
                type: "monthly",
                unread: true,
                time: d.time,
                text:
                  `📊 Chốt điện & nước<br>` +
                  `🔌 Điện năng: <b>${d.energy}</b> kWh<br>` +
                  `💧 Tổng nước: <b>${d.water_m3}</b> m³`,
              });
            });

            render();
          });

        /* ===== LOAD ALERT LOG ===== */
        firebase
          .database()
          .ref(`users/${uid}/logs/alerts`)
          .limitToLast(20)
          .on("value", (snap) => {
            notifications = notifications.filter((n) => n.type !== "alert");

            snap.forEach((child) => {
              const d = child.val();
              notifications.push({
                id: child.key,
                type: "alert",
                unread: true,
                time: d.time,
                text:
                  `⚡ <b>Vượt ngưỡng dòng điện</b><br>` +
                  `Dòng điện: <b>${d.current}</b> A<br>` +
                  `Ngưỡng: <b>${d.threshold}</b> A`,
              });
            });

            render();
          });

        /* ===== PARSE TIME HELPER ===== */
        function parseVietnameseTime(timeStr) {
          // Format: "17:03:09 17/1/2026"
          const parts = timeStr.split(" ");
          if (parts.length !== 2) return new Date(timeStr);

          const timePart = parts[0]; // "17:03:09"
          const datePart = parts[1]; // "17/1/2026"

          const [day, month, year] = datePart.split("/");
          const [hours, minutes, seconds] = timePart.split(":");

          return new Date(year, month - 1, day, hours, minutes, seconds);
        }

        /* ===== RENDER UI ===== */
        function render() {
          notiList.innerHTML = "";
          let unread = 0;

          notifications
            .sort(
              (a, b) =>
                parseVietnameseTime(b.time) - parseVietnameseTime(a.time),
            )
            .forEach((n) => {
              if (n.unread) unread++;

              const div = document.createElement("div");
              div.className = "noti-item" + (n.unread ? " unread" : "");

              div.innerHTML = `
                    <div class="dot">${n.unread ? "●" : ""}</div>
                    <div class="content">
                        <div class="text">${n.text}</div>
                        <div class="time">${n.time}</div>
                    </div>
                    ${
                      n.type === "alert"
                        ? `<button class="del" data-id="${n.id}">✖</button>`
                        : ""
                    }
                `;

              div.onclick = () => {
                n.unread = false;
                render();
              };

              if (n.type === "alert") {
                div.querySelector(".del").onclick = (e) => {
                  e.stopPropagation();
                  firebase
                    .database()
                    .ref(`users/${uid}/logs/alerts/${n.id}`)
                    .remove();
                };
              }

              notiList.appendChild(div);
            });

          badge.innerText = unread;
          badge.style.display = unread ? "inline-block" : "none";
        }

        /* ===== MARK ALL READ ===== */
        window.markAllRead = () => {
          notifications.forEach((n) => (n.unread = false));
          render();
        };

        /* ===== DELETE ALL NOTIFICATIONS ===== */
        window.deleteAllNotifications = () => {
          if (!confirm("Bạn có chắc muốn xóa toàn bộ lịch sử thông báo?"))
            return;

          // Xóa alerts trong Firebase
          firebase.database().ref(`users/${uid}/logs/alerts`).remove();

          // Xóa monthly logs trong Firebase
          firebase.database().ref(`users/${uid}/logs/monthly`).remove();

          // Xóa local notifications array
          notifications = [];
          render();
        };
      });
    </script>
  </body>
</html>
