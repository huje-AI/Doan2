<!doctype html>
<!--
  ============================================================
  FILE: auth.html
  MO TA: Trang dang nhap va dang ky tai khoan Firebase
  ============================================================
-->
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - IoT Monitor</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <!-- Back button -->
    <a href="index.html" class="back-btn">
      <img src="back.png" alt="back" />
    </a>

    <div class="auth-container">
      <div class="auth-box">
        <!-- Brand -->
        <div class="auth-brand">
          <div class="auth-brand-icon">⚡</div>
          <span class="auth-brand-name">IoT Monitor</span>
        </div>

        <h2 id="title">Đăng nhập</h2>
        <p class="auth-subtitle" id="subtitle">Đăng nhập để quản lý hệ thống giám sát</p>

        <!-- Email input -->
        <div class="input-group">
          <span class="input-icon">📧</span>
          <input type="email" id="email" placeholder="Email" />
        </div>

        <!-- Password input -->
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Mật khẩu" />
        </div>

        <p id="errorMsg" class="error-msg"></p>

        <button id="submitBtn" onclick="handleSubmit()">Đăng nhập</button>

        <p class="switch">
          Chưa có tài khoản?
          <span onclick="switchForm()">Đăng ký</span>
        </p>
      </div>
    </div>

    <!-- ===== FIREBASE SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
      /* ===== FIREBASE CONFIG ===== */
      var firebaseConfig = {
        apiKey: "AIzaSyD9Vmq5O9sVpOsTtQ3qNIyggsIaobNfBMw",
        authDomain: "do-an-high.firebaseapp.com",
        databaseURL: "https://do-an-high-default-rtdb.firebaseio.com/",
        projectId: "do-an-high",
      };

      firebase.initializeApp(firebaseConfig);

      /* ===== UI STATE ===== */
      let isLogin = true;

      function showError(message) {
        document.getElementById("errorMsg").innerText = message;
      }

      function clearError() {
        document.getElementById("errorMsg").innerText = "";
      }

      /* ===== SWITCH FORM ===== */
      function switchForm() {
        clearError();

        const title = document.getElementById("title");
        const subtitle = document.getElementById("subtitle");
        const btn = document.getElementById("submitBtn");
        const sw = document.querySelector(".switch");

        if (isLogin) {
          title.innerText = "Đăng ký";
          subtitle.innerText = "Tạo tài khoản mới để bắt đầu";
          btn.innerText = "Đăng ký";
          sw.innerHTML = `Đã có tài khoản? <span onclick="switchForm()">Đăng nhập</span>`;
        } else {
          title.innerText = "Đăng nhập";
          subtitle.innerText = "Đăng nhập để quản lý hệ thống giám sát";
          btn.innerText = "Đăng nhập";
          sw.innerHTML = `Chưa có tài khoản? <span onclick="switchForm()">Đăng ký</span>`;
        }
        isLogin = !isLogin;
      }

      /* ===== SUBMIT ===== */
      function handleSubmit() {
        clearError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!email || !password) {
          showError("Vui lòng nhập đầy đủ email và mật khẩu");
          return;
        }

        if (isLogin) {
          loginUser(email, password);
        } else {
          registerUser(email, password);
        }
      }

      /* ===== REGISTER ===== */
      function registerUser(email, password) {
        firebase
          .auth()
          .createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            const uid = userCredential.user.uid;

            firebase
              .database()
              .ref("users/" + uid)
              .set({
                email: email,
                createdAt: new Date().toISOString(),
              });

            clearError();
            alert("Đăng ký thành công! Vui lòng đăng nhập.");
            switchForm();
          })
          .catch((error) => {
            showError(error.message);
          });
      }

      /* ===== LOGIN ===== */
      function loginUser(email, password) {
        firebase
          .auth()
          .signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            const uid = userCredential.user.uid;

            firebase
              .database()
              .ref("users/" + uid)
              .once("value")
              .then((snapshot) => {
                if (snapshot.exists()) {
                  localStorage.setItem("loginSuccess", "true");
                  localStorage.setItem("userEmail", email);
                  localStorage.setItem("userUID", uid);

                  window.location.href = "index.html";
                } else {
                  showError("Tài khoản không hợp lệ");
                  firebase.auth().signOut();
                }
              });
          })
          .catch(() => {
            showError("Sai email hoặc mật khẩu");
          });
      }
    </script>
  </body>
</html>
