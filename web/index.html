<!doctype html>
<!--
  ============================================================
  FILE: index.html
  MO TA: Trang Dashboard chinh cua he thong giam sat dien nuoc
  ============================================================
-->
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IoT Dashboard - Giám sát điện nước</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- TOAST THONG BAO DANG NHAP THANH CONG -->
    <div id="loginToast" class="toast">
      <img src="success.png" alt="success" />
      <span>Đăng nhập thành công</span>
    </div>

    <!-- THONG TIN NGUOI DUNG -->
    <div id="userInfo" class="user-info">
      <img src="user.png" class="user-avatar" />
      <span id="userEmail"></span>
      <button onclick="logout()">Đăng xuất</button>
    </div>

    <!-- THONG BAO CHOT DIEN NUOC -->
    <div id="monthlyNotification" class="monthly-notification hidden">
      <div class="notif-icon">📊</div>
      <div class="notif-content">
        <div class="notif-title" id="notifTitle">Đã chốt điện nước!</div>
        <div class="notif-message" id="notifMessage"></div>
      </div>
      <button class="notif-close" onclick="closeNotification()">✕</button>
    </div>

    <div class="container">
      <!-- SIDEBAR -->
      <div class="sidebar collapsed" id="sidebar">
        <!-- Brand -->
        <div class="sidebar-brand">
          <div class="brand-icon">⚡</div>
          <div class="brand-text">
            <span class="brand-name">IoT Monitor</span>
            <span class="brand-sub">Điện & Nước</span>
          </div>
        </div>

        <!-- Toggle -->
        <div class="toggle-btn" onclick="toggleSidebar()">
          <img src="menu.png" />
        </div>

        <!-- Navigation -->
        <div class="nav-section">
          <div class="nav-label">Điều hướng</div>

          <div class="menu-item active" id="nav-dien-nuoc" onclick="loadPage('dien_nuoc.html', this)">
            <img src="electric.png" />
            <span>Giám sát điện nước</span>
          </div>

          <div class="menu-item" id="nav-chart" onclick="loadPage('chart.html', this)">
            <img src="chart.png" />
            <span>Đồ thị & Thông báo</span>
          </div>

          <div class="nav-label">Tài khoản</div>

          <div class="menu-item" onclick="window.location.href = 'auth.html'">
            <img src="user.png" />
            <span>Đăng nhập / Đăng ký</span>
          </div>
        </div>

        <!-- Menu Bottom -->
        <div class="menu-bottom">
          <div class="menu-item" id="nav-setting" onclick="loadPage('setting.html', this)">
            <img src="setting.jpg" />
            <span>Cài đặt</span>
          </div>
        </div>
      </div>

      <!-- MAIN -->
      <div class="main">
        <iframe
          id="contentFrame"
          src="dien_nuoc.html"
          frameborder="0"
          style="
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
          "
        >
        </iframe>
      </div>
    </div>

    <!-- ===== FIREBASE SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
      /* ===== FIREBASE CONFIG ===== */
      var firebaseConfig = {
        apiKey: "AIzaSyD9Vmq5O9sVpOsTtQ3qNIyggsIaobNfBMw",
        authDomain: "do-an-high.firebaseapp.com",
        databaseURL: "https://do-an-high-default-rtdb.firebaseio.com/",
        projectId: "do-an-high",
      };

      firebase.initializeApp(firebaseConfig);

      /* ===== SIDEBAR ===== */
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("collapsed");
      }

      /* ===== ACTIVE MENU ===== */
      function setActiveMenu(el) {
        document.querySelectorAll('.menu-item').forEach(item => {
          item.classList.remove('active');
        });
        if (el) el.classList.add('active');
      }

      /* ===== TOAST ===== */
      function showLoginSuccess() {
        const toast = document.getElementById("loginToast");
        toast.classList.add("show");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      /* ===== FIREBASE AUTH STATE ===== */
      firebase.auth().onAuthStateChanged((user) => {
        const userInfo = document.getElementById("userInfo");
        const emailSpan = document.getElementById("userEmail");

        if (user) {
          emailSpan.innerText = user.email;
          userInfo.style.display = "flex";

          if (localStorage.getItem("loginSuccess") === "true") {
            showLoginSuccess();
            localStorage.removeItem("loginSuccess");
          }
        } else {
          userInfo.style.display = "none";
        }
      });

      /* ===== LOGOUT ===== */
      function logout() {
        firebase
          .auth()
          .signOut()
          .then(() => {
            localStorage.clear();
            window.location.href = "index.html";
          });
      }

      /* ===== NOTIFICATION CHOT DIEN NUOC ===== */
      function closeNotification() {
        const notif = document.getElementById("monthlyNotification");
        notif.classList.add("hidden");

        const user = firebase.auth().currentUser;
        if (user) {
          firebase
            .database()
            .ref(`users/${user.uid}/notifications/monthly_close/unread`)
            .set(false);
        }
      }

      function checkMonthlyNotification() {
        const user = firebase.auth().currentUser;
        if (!user) return;

        firebase
          .database()
          .ref(`users/${user.uid}/notifications/monthly_close`)
          .on("value", (snap) => {
            const notif = snap.val();
            if (!notif || !notif.unread) return;

            const notifEl = document.getElementById("monthlyNotification");
            document.getElementById("notifTitle").textContent =
              notif.title || "📊 Đã chốt điện nước!";
            document.getElementById("notifMessage").textContent =
              notif.message || "";

            notifEl.classList.remove("hidden");

            setTimeout(() => {
              notifEl.classList.add("hidden");
              firebase
                .database()
                .ref(`users/${user.uid}/notifications/monthly_close/unread`)
                .set(false);
            }, 10000);
          });
      }
    </script>

    <!-- FIREBASE DATABASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          checkMonthlyNotification();
        }
      });
    </script>

    <script>
      let currentPage = "dien_nuoc.html";

      function loadPage(page, el) {
        if (currentPage === page) return;
        currentPage = page;
        document.getElementById("contentFrame").src = page;
        if (el) setActiveMenu(el);
      }
    </script>
  </body>
</html>
